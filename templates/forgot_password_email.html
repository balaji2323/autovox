<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="app-shell">
    <section class="login-screen">
      <div class="hero-panel panel">
        <div class="eyebrow">Password recovery</div>
        <h1>Reset your RecruitAI password safely.</h1>
        <p class="hero-copy">
          Enter your recruiter email to receive a one-time password and continue to the next step.
        </p>
      </div>

      <div class="login-panel panel">
        <div class="panel-header">
          <span class="eyebrow">Step 1</span>
          <h2>Enter Email</h2>
          <p>We will send an OTP to the email linked to your recruiter account.</p>
        </div>

        <form id="forgotPasswordRequestForm" class="login-form">
          <label class="field">
            <span>Email</span>
            <input id="forgotEmailInput" type="email" placeholder="Enter your account email">
          </label>
          <p id="forgotPasswordMessage" class="error-text"></p>
          <button type="submit" class="primary-button">Send OTP</button>
          <a class="text-button" href="/">Back to Sign In</a>
        </form>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/forgot_password_email.js') }}"></script>
</body>
</html>
