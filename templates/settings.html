<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruiter Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="app-shell inner-shell">
    <main class="workspace single-workspace">
      <header class="topbar panel">
        <div class="brand-row">
          <div class="brand-mark">AI Recruiter</div>
        </div>
        <nav class="top-actions">
          <div class="profile-chip">
            <div class="avatar-badge">B</div>
            <div class="profile-copy">
              <strong id="profileName">Balaji</strong>
            </div>
          </div>
          <button class="logout-chip" id="logoutButton">Logout</button>
        </nav>
      </header>

      <section class="panel page-hero">
        <h1>Recruiter Profile</h1>
        <p id="userBadge">Update recruiter details, username, and password from the portal itself.</p>
      </section>

      <div id="settingsStatus" class="settings-status"></div>

      <section class="profile-grid">
        <section class="panel profile-card">
          <div class="profile-header">
            <div class="avatar-badge avatar-large">B</div>
            <div>
              <h3 id="recruiterNamePreview">Balaji</h3>
              <p id="recruiterRolePreview">Senior AI Recruiter</p>
            </div>
          </div>

          <form id="profileForm" class="stack">
            <div class="settings-form-grid">
              <label class="field">
                <span>Recruiter Name</span>
                <input id="recruiterName" type="text" placeholder="Enter recruiter name">
              </label>
              <label class="field">
                <span>Role</span>
                <input id="recruiterRole" type="text" placeholder="Enter recruiter role">
              </label>
              <label class="field">
                <span>Email</span>
                <input id="recruiterEmail" type="email" placeholder="Enter email">
              </label>
              <label class="field">
                <span>Phone</span>
                <input id="recruiterPhone" type="text" placeholder="Enter phone number">
              </label>
              <label class="field">
                <span>Company</span>
                <input id="recruiterCompany" type="text" placeholder="Enter company name">
              </label>
              <label class="field">
                <span>Location</span>
                <input id="recruiterLocation" type="text" placeholder="Enter location">
              </label>
            </div>
            <label class="field">
              <span>Experience</span>
              <input id="recruiterExperience" type="text" placeholder="Enter experience summary">
            </label>
            <button type="submit" class="primary-button">Save Recruiter Profile</button>
          </form>
        </section>

        <section class="panel profile-card">
          <div class="panel-head">
            <div>
              <h3>Login Credentials</h3>
              <p>Change the username and password used while logging in.</p>
            </div>
          </div>

          <div class="profile-meta compact-meta">
            <div class="detail-row">
              <span>Access Level</span>
              <strong id="recruiterAccessLevel">Administrator</strong>
            </div>
            <div class="detail-row">
              <span>Status</span>
              <strong id="recruiterStatus">Active</strong>
            </div>
          </div>

          <form id="credentialsForm" class="stack credentials-form">
            <label class="field">
              <span>Username</span>
              <input id="recruiterUsername" type="text" placeholder="Enter username">
            </label>
            <label class="field">
              <span>New Password</span>
              <input id="recruiterPassword" type="password" placeholder="Enter new password">
            </label>
            <label class="field">
              <span>Confirm Password</span>
              <input id="recruiterConfirmPassword" type="password" placeholder="Confirm new password">
            </label>
            <button type="submit" class="success-button">Update Login Credentials</button>
          </form>
        </section>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
