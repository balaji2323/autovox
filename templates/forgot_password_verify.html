<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="app-shell">
    <section class="login-screen">
      <div class="hero-panel panel">
        <div class="eyebrow">OTP verification</div>
        <h1>Verify the one-time password.</h1>
        <p class="hero-copy">
          Enter the OTP sent to <strong>{{ reset_email }}</strong> and continue to the password update page.
        </p>
      </div>

      <div class="login-panel panel">
        <div class="panel-header">
          <span class="eyebrow">Step 2</span>
          <h2>Verify OTP</h2>
          <p>Use the six-digit OTP from your email to confirm your password reset request.</p>
        </div>

        <form id="forgotPasswordVerifyForm" class="login-form">
          <label class="field">
            <span>OTP</span>
            <input id="forgotOtpInput" type="text" inputmode="numeric" maxlength="6" placeholder="Enter OTP">
          </label>
          <p id="forgotPasswordMessage" class="error-text"></p>
          <button type="submit" class="primary-button">Verify OTP</button>
          <a class="text-button" href="/forgot-password">Back to Email Step</a>
        </form>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/forgot_password_verify.js') }}"></script>
</body>
</html>
