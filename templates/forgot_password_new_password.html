<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="app-shell">
    <section class="login-screen">
      <div class="hero-panel panel">
        <div class="eyebrow">Create password</div>
        <h1>Set your new password.</h1>
        <p class="hero-copy">
          OTP verified for <strong>{{ reset_email }}</strong>. Create a new password to regain access.
        </p>
      </div>

      <div class="login-panel panel">
        <div class="panel-header">
          <span class="eyebrow">Step 3</span>
          <h2>New Password</h2>
          <p>Enter your new password and confirm it to finish resetting your account.</p>
        </div>

        <form id="forgotPasswordResetForm" class="login-form">
          <label class="field">
            <span>New Password</span>
            <input id="forgotNewPasswordInput" type="password" placeholder="Enter new password">
          </label>
          <label class="field">
            <span>Confirm Password</span>
            <input id="forgotConfirmPasswordInput" type="password" placeholder="Confirm new password">
          </label>
          <p id="forgotPasswordMessage" class="error-text"></p>
          <button type="submit" class="success-button">Set New Password</button>
          <a class="text-button" href="/">Back to Sign In</a>
        </form>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/forgot_password_new_password.js') }}"></script>
</body>
</html>
